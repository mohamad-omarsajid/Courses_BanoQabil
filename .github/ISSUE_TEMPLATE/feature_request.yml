name: Feature request
description: Suggest an improvement or new course feature.
title: "Feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: idea
    attributes:
      label: What do you want to add?
      placeholder: Add a progress tracker for completed lessons.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is this useful for learners?
      placeholder: It helps students know where to continue.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra notes or examples
