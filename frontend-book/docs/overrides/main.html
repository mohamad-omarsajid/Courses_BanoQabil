{% extends "base.html" %}

{# Custom course-switcher bar, rendered just under the header in the tabs slot. #}
{% block tabs %}
  <nav class="bq-course-bar" aria-label="Courses">
    <div class="bq-course-bar__inner md-grid">
      <span class="bq-course-bar__label">Courses</span>
      <a class="bq-course is-active" href="{{ base_url }}">Front End Development</a>
      <span class="bq-course is-soon">Graphic Design <em>soon</em></span>
      <a class="bq-course-bar__home" href="https://courses.banoqabilsahiwal.org/courses/frontend" title="Go to the course home page">Course home &nearr;</a>
    </div>
  </nav>
{% endblock %}
