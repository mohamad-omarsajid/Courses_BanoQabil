site_name: "Bano Qabil Courses"
site_description: Free, self-paced, beginner-first front-end web development course. English and Roman Urdu.
site_url: https://courses.banoqabilsahiwal.org/frontend/
docs_dir: docs

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - navigation.expand
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  logo: assets/img/logo.png
  palette:
    # Dark is the default (matches the design direction); first entry wins.
    - scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: white
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - stylesheets/brand.css
  - stylesheets/exercises.css

extra_javascript:
  - javascripts/language-toggle.js
  - javascripts/glossary-tooltip.js
  - javascripts/quiz.js
  - javascripts/external-links.js
  - javascripts/sidebar-toggle.js
  - javascripts/toc-fab.js
  - javascripts/mobile-controls.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - abbr
  - footnotes
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: quiz
          class: bq-quiz-src
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

