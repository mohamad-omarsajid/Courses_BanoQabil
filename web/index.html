<!doctype html>
<html lang="en" data-theme="light" data-lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0fab95" />
    <title>Bano Qabil Sahiwal: free, self-paced courses in web and design</title>
    <meta
      name="description"
      content="Two free, beginner-first online courses from Sahiwal: front-end web development and graphic design with UI and UX. Start anytime, learn at your own pace, in English and Roman Urdu."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Set theme + language before paint so there is no flash -->
    <script>
      (function () {
        var root = document.documentElement;
        try {
          var t = localStorage.getItem('bqs-theme');
          if (t !== 'light' && t !== 'dark') {
            t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          root.setAttribute('data-theme', t);
          root.setAttribute('data-lang', localStorage.getItem('bqs-lang') === 'ru' ? 'ru' : 'en');
        } catch (e) {
          root.setAttribute('data-theme', 'light');
          root.setAttribute('data-lang', 'en');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
