<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Course Coming Soon | Bano Qabil Sahiwal</title>
    <meta
      name="description"
      content="The Bano Qabil Sahiwal design course is being prepared. The front-end course is open now."
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6faf8;
        --fg: #102421;
        --muted: #5d716d;
        --line: #dce8e4;
        --primary: #087968;
        --primary-dark: #075f54;
        --surface: #ffffff;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #071311;
          --fg: #eefaf7;
          --muted: #a9bdb8;
          --line: #23403a;
          --primary: #47d5be;
          --primary-dark: #9df0e2;
          --surface: #0d1d1a;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at 18% 18%, rgba(71, 213, 190, 0.18), transparent 28rem),
          radial-gradient(circle at 86% 70%, rgba(8, 121, 104, 0.16), transparent 24rem),
          var(--bg);
        color: var(--fg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 760px);
        border: 1px solid var(--line);
        border-radius: 28px;
        background: color-mix(in oklab, var(--surface) 92%, transparent);
        padding: clamp(28px, 6vw, 64px);
        box-shadow: 0 24px 80px rgba(4, 29, 25, 0.14);
      }

      img {
        width: 72px;
        height: 72px;
        object-fit: contain;
        border-radius: 18px;
        background: #fff;
        padding: 8px;
        box-shadow: 0 12px 36px rgba(4, 29, 25, 0.12);
      }

      .eyebrow {
        margin: 28px 0 10px;
        color: var(--primary-dark);
        font: 700 12px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 12ch;
        margin: 0;
        font-size: clamp(2.5rem, 8vw, 5rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        max-width: 58ch;
        margin: 22px 0 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 34px;
      }

      a {
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 0 20px;
        color: var(--fg);
        font-weight: 700;
        text-decoration: none;
        border: 1px solid var(--line);
      }

      a.primary {
        border-color: transparent;
        background: var(--primary);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo.png" alt="Bano Qabil Sahiwal" />
      <p class="eyebrow">Design course</p>
      <h1>Coming soon.</h1>
      <p>
        The design course is being polished before public release. The front-end course is open now, and the design
        track will be added here when its chapters are ready.
      </p>
      <div class="actions">
        <a class="primary" href="/frontend/">Open Front-End course</a>
        <a href="/">Back to home</a>
      </div>
    </main>
  </body>
</html>
